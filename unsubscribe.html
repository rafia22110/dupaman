<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ביטול הרשמה – SSR News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif; background: #0A0A0F; color: #F0F0FF;
      direction: rtl; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(108,99,255,0.3);
      border-radius: 24px; padding: 60px 48px; max-width: 500px; width: 90%;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
    p { color: #A0A0C0; line-height: 1.7; margin-bottom: 16px; }
    input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #F0F0FF; padding: 14px 20px; border-radius: 12px;
      font-size: 1rem; font-family: 'Heebo', sans-serif; outline: none;
      margin-bottom: 16px; transition: all 0.3s ease;
    }
    input:focus { border-color: #6C63FF; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    input::placeholder { color: #6A6A8A; }
    .btn {
      width: 100%; background: #dc2626; color: white; border: none;
      padding: 14px 32px; border-radius: 100px; font-size: 1rem;
      font-weight: 700; font-family: 'Heebo', sans-serif; cursor: pointer;
      transition: all 0.3s ease; margin-bottom: 12px;
    }
    .btn:hover { background: #b91c1c; transform: translateY(-1px); }
    .back { display: inline-flex; align-items: center; gap: 6px; color: #8B85FF; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    .logo { font-size: 1.2rem; font-weight: 900; color: #8B85FF; margin-bottom: 24px; }
    .success-msg { display: none; color: #4ADE80; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 12px; padding: 16px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✦ SSR News</div>
    <div class="icon">😢</div>
    <h1>ביטול הרשמה</h1>
    <p>מצטערים לראות אותך הולך! הזן את כתובת המייל שלך כדי לבטל את המנוי.</p>
    <form id="unsubForm">
      <input type="email" id="unsubEmail" placeholder="your@email.com" required />
      <button type="submit" class="btn">ביטול הרשמה</button>
    </form>
    <div class="success-msg" id="successMsg">✓ כתובת המייל שלך הוסרה בהצלחה.</div>
    <br/>
    <a href="index.html" class="back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      חזרה לדף הבית
    </a>
  </div>
  <script>
    document.getElementById('unsubForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('unsubEmail').value;
      // TODO: Connect to n8n webhook for unsubscribe
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('unsubForm').style.display = 'none';
    });
  </script>
</body>
</html>

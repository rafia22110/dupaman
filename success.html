<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הרשמה בוצעה בהצלחה – SSR News</title>
  <meta name="description" content="נרשמת בהצלחה ל-SSR News! תודה על ההצטרפות." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6C63FF; --primary-light: #8B85FF; --accent: #FF6B9D;
      --bg: #0A0A0F; --bg2: #0F0F1A; --surface: rgba(255,255,255,0.05);
      --border2: rgba(108,99,255,0.3); --text: #F0F0FF; --text2: #A0A0C0;
    }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .bg { position: fixed; inset: 0; }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px);
      opacity: 0.35; pointer-events: none;
    }
    .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--primary), transparent 70%); top: -200px; right: -100px; animation: float 8s ease-in-out infinite; }
    .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, var(--accent), transparent 70%); bottom: -150px; left: -100px; animation: float 8s ease-in-out infinite reverse; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 32px;
      padding: 72px 60px;
      max-width: 560px;
      width: 90%;
      backdrop-filter: blur(20px);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    .icon { font-size: 5rem; margin-bottom: 24px; animation: bounce 0.6s ease 0.3s both; }
    @keyframes bounce { from{transform:scale(0)} 60%{transform:scale(1.2)} to{transform:scale(1)} }
    h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 16px; }
    .name { color: var(--primary-light); }
    p { font-size: 1.05rem; color: var(--text2); line-height: 1.7; margin-bottom: 40px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--primary), #5A52D5);
      color: white; border: none;
      padding: 16px 36px; border-radius: 100px;
      font-size: 1rem; font-weight: 700;
      font-family: 'Heebo', sans-serif;
      cursor: pointer; text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn:hover { box-shadow: 0 8px 30px rgba(108,99,255,0.5); transform: translateY(-2px); }
    .time-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
      color: #4ADE80; font-size: 0.85rem; font-weight: 600;
      padding: 8px 20px; border-radius: 100px; margin-top: 24px;
    }
    .dot { width: 8px; height: 8px; background: #4ADE80; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0.4)} 50%{box-shadow:0 0 0 6px rgba(74,222,128,0)} }
    .logo { font-size: 1.2rem; font-weight: 900; color: var(--primary-light); margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>
  <div class="card">
    <div class="logo">✦ SSR News</div>
    <div class="icon">🎉</div>
    <h1>שלום, <span class="name" id="nameDisplay">חבר</span>!</h1>
    <p>
      נרשמת בהצלחה ל-SSR News – הניוזלטר היומי שלך.<br/>
      תקבל ניוזלטר כל יום ב-7:00 בבוקר עם מאמרים מסוכמים בעברית, משפט לחיים, ושאלה לחשיבה.
    </p>
    <a href="index.html" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      חזרה לדף הבית
    </a>
    <div class="time-badge">
      <span class="dot"></span>
      הגיליון הבא שלך מגיע מחר ב-7:00 ☀️
    </div>
  </div>
  <script>
    // Get name from URL params if passed
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    if (name) document.getElementById('nameDisplay').textContent = name;
  </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="he" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דופמין – ניוזלטר יומי</title>
  <style>
    :root {
      --bg:#000;--bg2:#0d0d0d;--bg3:#141414;--bg4:#1a1a1a;--bg5:#222;
      --border:#1e1e1e;--border2:#2a2a2a;--border3:#333;
      --green:#00ff88;--green-dim:#00cc6a;
      --white:#fff;--gray1:#ccc;--gray2:#888;--gray3:#444;
      --orange:#ff8c42;--blue:#4a9eff;--purple:#a855f7;--yellow:#fbbf24;
      --red:#ef4444;--pink:#ec4899;--cyan:#22d3ee;--teal:#14b8a6;--indigo:#6366f1;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--white);direction:rtl;min-height:100vh}

    /* ─── HEADER ─── */
    header{background:var(--bg);border-bottom:1px solid var(--border2);padding:0 20px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;height:52px}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-icon{width:26px;height:26px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000}
    .logo-name{font-size:15px;font-weight:700;color:var(--white);letter-spacing:-.3px}
    .logo-beta{font-size:9px;color:var(--gray3);letter-spacing:1px;display:block}
    nav{display:flex;align-items:center;gap:2px}
    .nav-item{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;color:var(--gray2);font-size:12px;cursor:pointer;transition:all .15s;border:none;background:transparent;text-decoration:none;white-space:nowrap}
    .nav-item:hover{background:var(--bg4);color:var(--white)}
    .nav-item.active{color:var(--green)}
    .nav-auth{background:var(--green);color:#000;font-weight:700;padding:5px 14px;border-radius:6px;font-size:12px}
    .nav-auth:hover{background:var(--green-dim);color:#000}

    /* ─── LANG SWITCHER ─── */
    .lang-switcher{display:flex;align-items:center;gap:2px;margin-left:6px}
    .lang-btn{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--gray3);transition:all .15s;letter-spacing:.3px}
    .lang-btn:hover{border-color:var(--gray2);color:var(--white)}
    .lang-btn.active{background:var(--bg4);border-color:var(--green);color:var(--green)}

    /* ─── SEARCH ─── */
    .search-wrap{padding:14px 20px 0;display:flex;gap:8px}
    .search-box{flex:1;position:relative}
    .search-box svg{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray3);pointer-events:none}
    .search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 34px 9px 12px;color:var(--white);font-size:13px;outline:none;transition:border-color .15s}
    .search-input:focus{border-color:var(--green)}
    .search-input::placeholder{color:var(--gray3)}
    select.flt{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--gray1);font-size:12px;cursor:pointer;outline:none}
    select.flt:focus{border-color:var(--green)}

    /* ─── TOPIC TABS ─── */
    .topic-row{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border2);overflow-x:auto;scrollbar-width:none;margin-top:12px}
    .topic-row::-webkit-scrollbar{display:none}
    .ttab{display:flex;align-items:center;gap:5px;padding:9px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--gray3);white-space:nowrap;transition:all .15s;border-bottom:2px solid transparent}
    .ttab:hover{color:var(--white)}
    .ttab.active{color:var(--white)}
    .ttab[data-t="all"].active{border-bottom-color:#fff}
    .ttab[data-t="ai"].active{border-bottom-color:var(--green)}
    .ttab[data-t="psychology"].active{border-bottom-color:var(--purple)}
    .ttab[data-t="neuroscience"].active{border-bottom-color:var(--pink)}
    .ttab[data-t="education"].active{border-bottom-color:var(--yellow)}
    .ttab[data-t="health"].active{border-bottom-color:var(--red)}
    .ttab[data-t="science"].active{border-bottom-color:var(--cyan)}
    .ttab[data-t="physics"].active{border-bottom-color:var(--indigo)}
    .ttab[data-t="astronomy"].active{border-bottom-color:var(--orange)}
    .ttab[data-t="tutorials"].active{border-bottom-color:var(--teal)}
    .tdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
    .tcnt{font-size:10px;background:var(--bg4);border-radius:10px;padding:1px 5px;color:var(--gray3)}

    /* ─── PILLS ─── */
    .sub-bar{padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
    .sub-label{font-size:10px;color:var(--gray3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
    .pills{display:flex;flex-wrap:wrap;gap:5px}
    .pill{padding:3px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border2);color:var(--gray2);background:transparent;transition:all .15s;white-space:nowrap}
    .pill:hover{border-color:var(--gray2);color:var(--white)}
    .pill.on{background:var(--green);border-color:var(--green);color:#000;font-weight:700}

    /* ─── STATS ─── */
    .stats{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border)}
    .stats-l{font-size:11px;color:var(--gray3)}
    .stats-l span{color:var(--green);font-weight:600}
    .vtgl{display:flex;gap:3px}
    .vb{width:28px;height:28px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--gray3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .vb.on,.vb:hover{border-color:var(--green);color:var(--green)}

    /* ─── LAYOUT ─── */
    .layout{display:grid;grid-template-columns:1fr 260px}
    .main-col{min-height:80vh}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border)}
    .grid.lv{grid-template-columns:1fr}

    /* ─── CARD ─── */
    .card{background:var(--bg);padding:18px;cursor:pointer;transition:background .15s}
    .card:hover{background:var(--bg2)}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
    .card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .card-date{font-size:10px;color:var(--gray3);font-family:monospace}
    .card-src{font-size:10px;font-weight:700}
    .bkm{width:26px;height:26px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--gray3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .bkm:hover,.bkm.saved{border-color:var(--yellow);color:var(--yellow)}
    .bkm.saved{background:rgba(251,191,36,.1)}
    .badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.2px}
    .card h3{font-size:14px;font-weight:600;line-height:1.55;color:var(--white);margin-bottom:10px}
    .card:hover h3{color:var(--green)}
    .sumlines{list-style:none;margin-bottom:10px}
    .sumlines li{font-size:12px;color:var(--gray2);padding:2px 14px 2px 0;position:relative;line-height:1.5}
    .sumlines li::before{content:"▸";position:absolute;right:0;color:var(--gray3);font-size:9px;top:4px}
    .life-box{background:rgba(74,158,255,.07);border:1px solid rgba(74,158,255,.18);border-radius:5px;padding:7px 10px;font-size:11px;color:var(--blue);margin-bottom:7px;line-height:1.5}
    .q-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:5px;padding:7px 10px;font-size:11px;color:var(--yellow);margin-bottom:12px;line-height:1.5}
    .card-foot{display:flex;align-items:center;justify-content:space-between}
    .clink{font-size:11px;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .15s}
    .clink:hover{color:var(--green)}
    .reacts{display:flex;gap:7px}
    .react{font-size:10px;color:var(--gray3);display:flex;align-items:center;gap:2px}

    /* ─── TOPIC COLORS ─── */
    .c-ai{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.25)}
    .c-psychology{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.25)}
    .c-neuroscience{background:rgba(236,72,153,.12);color:var(--pink);border:1px solid rgba(236,72,153,.25)}
    .c-education{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
    .c-health{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
    .c-science{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25)}
    .c-physics{background:rgba(99,102,241,.12);color:var(--indigo);border:1px solid rgba(99,102,241,.25)}
    .c-astronomy{background:rgba(255,140,66,.12);color:var(--orange);border:1px solid rgba(255,140,66,.25)}
    .c-tutorials{background:rgba(20,184,166,.12);color:var(--teal);border:1px solid rgba(20,184,166,.25)}
    .c-sub{background:var(--bg5);color:var(--gray2);border:1px solid var(--border2)}

    /* ─── SIDEBAR ─── */
    .sidebar{border-right:1px solid var(--border);padding:16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;scrollbar-width:thin}
    .sb-sec{margin-bottom:20px}
    .sb-title{font-size:10px;color:var(--gray3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
    .sb-item{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-radius:5px;font-size:12px;color:var(--gray2);cursor:pointer;transition:all .15s}
    .sb-item:hover{background:var(--bg3);color:var(--white)}
    .sb-cnt{font-size:10px;color:var(--gray3);background:var(--bg4);padding:1px 5px;border-radius:8px}

    /* ─── EMPTY / LOADING ─── */
    .empty{text-align:center;padding:60px 20px;color:var(--gray3)}
    .empty h3{font-size:16px;margin-bottom:6px;color:var(--gray2)}
    .loading-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border)}
    .skel{background:var(--bg);padding:18px;animation:pulse 1.5s infinite}
    .skel-line{background:var(--bg4);border-radius:4px;margin-bottom:8px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* ─── AUTH MODAL ─── */
    .moverlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
    .moverlay.open{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;padding:28px;max-height:92vh;overflow-y:auto}
    .modal.auth-modal{max-width:460px}
    .modal.article-modal{max-width:580px}
    .mclose{position:absolute;top:16px;left:16px;background:var(--bg4);border:1px solid var(--border2);color:var(--gray1);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
    .modal-inner{position:relative}

    /* AUTH TABS */
    .auth-tabs{display:flex;border-bottom:1px solid var(--border2);margin-bottom:24px}
    .auth-tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--gray2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .auth-tab.active{color:var(--green);border-bottom-color:var(--green)}

    /* FORM */
    .form-group{margin-bottom:16px}
    .form-label{font-size:12px;color:var(--gray2);margin-bottom:6px;display:block}
    .form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:10px 14px;color:var(--white);font-size:13px;outline:none;transition:border-color .15s;direction:rtl}
    .form-input:focus{border-color:var(--green)}
    .form-input::placeholder{color:var(--gray3)}
    .topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
    .topic-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;cursor:pointer;transition:all .15s;font-size:12px;color:var(--gray2)}
    .topic-check:hover{border-color:var(--gray2);color:var(--white)}
    .topic-check input{display:none}
    .topic-check.checked{border-color:var(--green);color:var(--white);background:rgba(0,255,136,.06)}
    .topic-check .chk-icon{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
    .topic-check.checked .chk-icon{background:var(--green);border-color:var(--green);color:#000}
    .btn-primary{width:100%;background:var(--green);color:#000;font-weight:700;font-size:14px;padding:12px;border-radius:8px;border:none;cursor:pointer;transition:background .15s;margin-top:4px}
    .btn-primary:hover{background:var(--green-dim)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .form-error{font-size:12px;color:var(--red);margin-top:8px;display:none}
    .form-success{font-size:13px;color:var(--green);margin-top:8px;display:none;text-align:center;padding:12px;background:rgba(0,255,136,.08);border-radius:6px;border:1px solid rgba(0,255,136,.2)}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--gray3);font-size:11px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
    .user-badge{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);font-size:12px;color:var(--gray1);cursor:pointer}
    .user-badge .u-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

    /* ─── ARTICLE MODAL ─── */
    .article-modal h2{font-size:18px;margin-bottom:16px;line-height:1.55}

    /* ─── RESPONSIVE ─── */
    @media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{display:none}.grid{grid-template-columns:1fr}}
    @media(max-width:600px){header{padding:0 10px}.search-wrap{padding:10px;flex-wrap:wrap}select.flt{flex:1}.topics-grid{grid-template-columns:1fr}}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <a href="#" class="logo" onclick="return false">
    <div class="logo-icon">D</div>
    <div>
      <span class="logo-name" data-i18n="logo-name">דופמין</span>
      <span class="logo-beta" data-i18n="logo-beta">BETA · ניוזלטר יומי</span>
    </div>
  </a>
  <nav>
    <a class="nav-item active" href="#" onclick="return false">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span data-i18n="nav-feed">פיד</span>
    </a>
    <a class="nav-item" href="#" onclick="return false">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg><span data-i18n="nav-saved">שמורים</span>
    </a>
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn active" data-lang="he" title="עברית">HE</button>
      <button class="lang-btn" data-lang="en" title="English">EN</button>
      <button class="lang-btn" data-lang="fr" title="Français">FR</button>
      <button class="lang-btn" data-lang="es" title="Español">ES</button>
    </div>
    <div id="nav-auth-area">
      <button class="nav-auth nav-item" onclick="openAuth('register')" data-i18n="nav-auth">כניסה / הרשמה</button>
    </div>
  </nav>
</header>

<!-- ══ SEARCH ══ -->
<div class="search-wrap">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" type="text" id="q" oninput="doFilter()" data-i18n-placeholder="search-placeholder" placeholder="חפש מאמרים, נושאים, מקורות...">
  </div>
  <select class="flt" id="sort" onchange="doFilter()">
    <option value="new" data-i18n="sort-new">החדשים קודם</option>
    <option value="old" data-i18n="sort-old">הישנים קודם</option>
    <option value="popular" data-i18n="sort-popular">הפופולריים</option>
  </select>
  <select class="flt" id="srcflt" onchange="doFilter()">
    <option value="">כל המקורות</option>
    <option>PsyPost</option>
    <option>MIT Tech Review</option>
    <option>MarkTechPost</option>
    <option>Edutopia</option>
    <option>Harvard Health</option>
    <option>Live Science</option>
    <option>Neuroscience News</option>
    <option>Google Blog</option>
  </select>
</div>

<!-- ══ TOPIC TABS ══ -->
<div class="topic-row" id="topic-row"></div>

<!-- ══ PILLS ══ -->
<div class="sub-bar">
  <div class="sub-label" data-i18n="sub-label">סנן לפי תת-נושא</div>
  <div class="pills" id="pills"></div>
</div>

<!-- ══ STATS ══ -->
<div class="stats">
  <div class="stats-l"><span data-i18n="showing">מציג</span> <span id="cnt">0</span> <span data-i18n="articles">מאמרים</span>
    <span id="data-src" style="margin-right:8px;font-size:10px;color:var(--gray3)"></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button onclick="loadArticles()" style="font-size:11px;color:var(--green);background:transparent;border:1px solid rgba(0,255,136,.3);border-radius:5px;padding:3px 8px;cursor:pointer" data-i18n="refresh">⟳ רענן</button>
    <div class="vtgl">
      <button class="vb on" onclick="setView('grid',this)" title="גריד">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
      </button>
      <button class="vb" onclick="setView('list',this)" title="רשימה">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor"/><circle cx="3" cy="12" r="1.5" fill="currentColor"/><circle cx="3" cy="18" r="1.5" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══ LAYOUT ══ -->
<div class="layout">
  <div class="main-col">
    <div id="grid-wrap"></div>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<!-- ══ AUTH MODAL ══ -->
<div class="moverlay" id="auth-modal">
  <div class="modal auth-modal">
    <div class="modal-inner">
      <button class="mclose" onclick="closeAuth()">✕</button>
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:22px;font-weight:900;color:var(--green)">דופמין</div>
        <div style="font-size:12px;color:var(--gray3);margin-top:3px" data-i18n="modal-subtitle">ניוזלטר יומי · BETA</div>
      </div>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('register',this)" id="tab-register" data-i18n="tab-register">הרשמה</div>
        <div class="auth-tab" onclick="switchTab('login',this)" id="tab-login" data-i18n="tab-login">כניסה</div>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register">
        <div class="form-group">
          <label class="form-label" data-i18n="label-name">שם מלא</label>
          <input class="form-input" type="text" id="reg-name" data-i18n-placeholder="placeholder-name" placeholder="ישראל ישראלי">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label-email">כתובת מייל</label>
          <input class="form-input" type="email" id="reg-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label-topics">בחר נושאים (ניתן לבחור כמה)</label>
          <div class="topics-grid" id="topics-grid"></div>
        </div>

let ALL_ARTICLES = [];

// ══════════════════════════════════════════════
// LOAD ARTICLES (from Apps Script or fallback)
// ══════════════════════════════════════════════
async function loadArticles() {
  showSkeleton();
  document.getElementById('data-src').textContent = '';

  if (APPS_SCRIPT_URL.startsWith('PASTE')) {
    // Use fallback demo data
    ALL_ARTICLES = FALLBACK_ARTICLES;
    document.getElementById('data-src').textContent = I18N[curLang]['demo-data'];
    buildAll();
    return;
  }

  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=articles`, { cache: 'no-store' });
    const data = await res.json();
    if (data.articles && data.articles.length > 0) {
      ALL_ARTICLES = data.articles;
      document.getElementById('data-src').textContent = `עודכן: ${new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'})}`;
    } else {
      ALL_ARTICLES = FALLBACK_ARTICLES;
      document.getElementById('data-src').textContent = I18N[curLang]['demo-data'];
    }
  } catch (e) {
    ALL_ARTICLES = FALLBACK_ARTICLES;
    document.getElementById('data-src').textContent = I18N[curLang]['demo-api'];
  }
  buildAll();
}

function showSkeleton() {
  document.getElementById('grid-wrap').innerHTML = `
    <div class="loading-grid">
      ${Array(6).fill(`
        <div class="skel">
          <div class="skel-line" style="height:10px;width:40%"></div>
          <div class="skel-line" style="height:16px;width:90%;margin-top:12px"></div>
          <div class="skel-line" style="height:16px;width:75%"></div>
          <div class="skel-line" style="height:12px;width:95%;margin-top:10px"></div>

          <div class="skel-line" style="height:12px;width:70%"></div>
          <div class="skel-line" style="height:40px;border-radius:5px;margin-top:10px"></div>
          <div class="skel-line" style="height:40px;border-radius:5px;margin-top:8px"></div>
        </div>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════════
// BUILD UI
// ══════════════════════════════════════════════
function buildAll() {
  buildTabs();
  buildPills();
  buildSidebar();
  doFilter();
}

function buildTabs() {
  const counts = {};
  TOPICS.forEach(t => {
    counts[t.id] = t.id === 'all' ? ALL_ARTICLES.length : ALL_ARTICLES.filter(a => a.topic === t.id).length;
  });
  document.getElementById('topic-row').innerHTML = TOPICS.map(t => `
    <button class="ttab ${t.id === curTopic ? 'active' : ''}" data-t="${t.id}" onclick="pickTopic('${t.id}',this)">
      <span class="tdot" style="background:${t.dot}"></span>${t.label}
      <span class="tcnt">${counts[t.id]}</span>
    </button>`).join('');
}

function buildPills() {
  const subs = SUBTOPICS[curTopic] || SUBTOPICS.all;
  document.getElementById('pills').innerHTML = subs.map(s =>
    `<button class="pill ${s === curSub ? 'on' : ''}" onclick="pickSub('${s}',this)">#${s}</button>`
  ).join('');
}

function buildSidebar() {
  const topicHtml = TOPICS.map(t => {
    const n = t.id === 'all' ? ALL_ARTICLES.length : ALL_ARTICLES.filter(a => a.topic === t.id).length;
    return `<div class="sb-item" onclick="pickTopic('${t.id}',null)">
      <span><span class="tdot" style="background:${t.dot};display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:7px"></span>${t.label}</span>
      <span class="sb-cnt">${n}</span></div>`;
  }).join('');

  const subs = SUBTOPICS[curTopic] || SUBTOPICS.all;
  const subHtml = subs.filter(s => s !== 'הכל').slice(0, 10).map(s => {
    const n = ALL_ARTICLES.filter(a => a.sub === s).length;
    return `<div class="sb-item" onclick="pickSub('${s}',null)">${s}<span class="sb-cnt">${n}</span></div>`;
  }).join('');

  const t = I18N[curLang];
  document.getElementById('sidebar').innerHTML = `
    <div class="sb-sec"><div class="sb-title">${t['sb-topics']}</div>${topicHtml}</div>
    <div class="sb-sec"><div class="sb-title">${t['sb-subtopics']}</div>${subHtml}</div>`;
}

function pickTopic(t, el) {
  curTopic = t; curSub = 'הכל';
  if (el) { document.querySelectorAll('.ttab').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
  else buildTabs();
  buildPills(); buildSidebar(); doFilter();
}

function pickSub(s, el) {
  curSub = s;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  if (el) el.classList.add('on');
  else buildPills();
  doFilter();
}

function doFilter() {
  const q = document.getElementById('q').value.toLowerCase();
  const src = document.getElementById('srcflt').value;
  let arr = ALL_ARTICLES.filter(a => {
    const mt = curTopic === 'all' || a.topic === curTopic;
    const ms = curSub === 'הכל' || a.sub === curSub;
    const mq = !q || a.title.toLowerCase().includes(q) || (a.lines||[]).join(' ').toLowerCase().includes(q);
    const msrc = !src || a.src === src;
    return mt && ms && mq && msrc;
  });
  const sort = document.getElementById('sort').value;
  if (sort === 'popular') arr.sort((a,b) => (b.r?.v||0) - (a.r?.v||0));
  renderGrid(arr);
  document.getElementById('cnt').textContent = arr.length;
}

function renderGrid(arr) {
  const wrap = document.getElementById('grid-wrap');
  const tl = I18N[curLang];
  if (!arr.length) {
    wrap.innerHTML = `<div class="empty"><h3>${tl['empty-h']}</h3><p>${tl['empty-p']}</p></div>`;
    return;
  }
  const tc = t => TOPICS.find(x => x.id === t) || {};
  const g = document.createElement('div');
  g.className = 'grid' + (curView === 'list' ? ' lv' : '');
  g.innerHTML = arr.map(a => {
    const srcColor = SRC_COLORS[a.src] || '#888';
    return `<div class="card" onclick="openArticle(${a.id})">
      <div class="card-top">
        <div class="card-meta">
          <span class="card-date">${a.date||''}</span>
          <span class="card-src" style="color:${srcColor}">${a.src||''}</span>
        </div>
        <button class="bkm" onclick="event.stopPropagation();this.classList.toggle('saved')" title="שמור">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        </button>
      </div>
      <div class="badges">
        <span class="badge c-${a.topic}">${tc(a.topic).label||a.topic}</span>
        <span class="badge c-sub">#${a.sub||''}</span>
      </div>
      <h3>${a.title||''}</h3>
      <ul class="sumlines">${(a.lines||[]).map(l => `<li>${l}</li>`).join('')}</ul>
      <div class="life-box">💡 ${a.life||''}</div>
      <div class="q-box">🤔 ${a.question||''}</div>
      <div class="card-foot">
        <a class="clink" href="${a.link||'#'}" target="_blank" onclick="event.stopPropagation()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${tl['read-src']}
        </a>
        <div class="reacts">
          <span class="react">👁 ${a.r?.v||0}</span>
          <span class="react">🔖 ${a.r?.s||0}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  wrap.innerHTML = '';
  wrap.appendChild(g);
}

function setView(v, btn) {
  curView = v;
  document.querySelectorAll('.vb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  doFilter();
}

// ══════════════════════════════════════════════
// ARTICLE MODAL
// ══════════════════════════════════════════════
function openArticle(id) {
  const a = ALL_ARTICLES.find(x => x.id === id);
  if (!a) return;
  const tc = TOPICS.find(x => x.id === a.topic) || {};
  const srcColor = SRC_COLORS[a.src] || '#888';
  document.getElementById('article-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap">
      <span class="badge c-${a.topic}">${tc.label||a.topic}</span>
      <span class="badge c-sub">#${a.sub||''}</span>
      <span style="font-size:10px;color:${srcColor};font-weight:700;margin-right:auto">${a.src||''}</span>
      <span style="font-size:10px;color:var(--gray3)">${a.date||''}</span>
    </div>
    <h2>${a.title||''}</h2>
    <ul class="sumlines" style="margin:14px 0">${(a.lines||[]).map(l=>`<li style="font-size:13px;padding:4px 16px 4px 0">${l}</li>`).join('')}</ul>
    <div class="life-box" style="font-size:13px;margin-bottom:10px">💡 <strong>מה זה אומר עליך:</strong> ${a.life||''}</div>
    <div class="q-box" style="font-size:13px;margin-bottom:18px">🤔 <strong>שאלה להיום:</strong> ${a.question||''}</div>
    <a class="clink" href="${a.link||'#'}" target="_blank" style="font-size:12px">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      קרא המאמר המלא ב-${a.src||''}
    </a>`;
  document.getElementById('article-modal').classList.add('open');
}
function closeArticle() { document.getElementById('article-modal').classList.remove('open'); }

// AUTH MODAL
// ══════════════════════════════════════════════
function openAuth(tab = 'register') {
  buildTopicsGrid();
  document.getElementById('auth-modal').classList.add('open');
  switchTab(tab, document.getElementById('tab-' + tab));
}
function closeAuth() { document.getElementById('auth-modal').classList.remove('open'); }

function switchTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
}

function buildTopicsGrid() {
  const grid = document.getElementById('topics-grid');
  if (grid.innerHTML) return; // already built
  grid.innerHTML = TOPICS.filter(t => t.id !== 'all').map(t => `
    <label class="topic-check" onclick="toggleCheck(this)">
      <input type="checkbox" value="${t.id}">
      <span class="chk-icon">✓</span>
      <span class="tdot" style="background:${t.dot}"></span>
      ${t.label}
    </label>`).join('');
}

function toggleCheck(el) {
  el.classList.toggle('checked');
  el.querySelector('input').checked = el.classList.contains('checked');
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const topics = [...document.querySelectorAll('#topics-grid input:checked')].map(i => i.value);
  const errEl = document.getElementById('reg-error');
  const sucEl = document.getElementById('reg-success');
  const btn = document.getElementById('reg-btn');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!email || !email.includes('@')) {
    errEl.textContent = 'נא להזין כתובת מייל תקינה';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.textContent = 'שולח...';

  try {
    let success = false;
    if (!SUBSCRIBE_WEBHOOK.startsWith('PASTE')) {
      const res = await fetch(SUBSCRIBE_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'subscribe', name, email, topics })
      });
      const data = await res.json();
      if (data.error === 'already_subscribed') {
        errEl.textContent = 'כתובת מייל זו כבר רשומה ✓';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'הרשם לניוזלטר היומי ✉️';
        return;
      }
      success = data.success;
    } else {
      // Demo mode
      success = true;
    }

    if (success) {
      const user = { name, email, topics };
      
      currentUser = user;
      updateNavAuth();
      sucEl.textContent = `✅ נרשמת בהצלחה${name ? ', ' + name : ''}! בדוק את המייל שלך לאישור.`;
      sucEl.style.display = 'block';
      btn.style.display = 'none';
      setTimeout(closeAuth, 3000);
    }
  } catch (e) {
    // Demo fallback
    const user = { name, email, topics };
    
    currentUser = user;
    updateNavAuth();
    sucEl.textContent = `✅ נרשמת בהצלחה${name ? ', ' + name : ''}!`;
    sucEl.style.display = 'block';
    btn.style.display = 'none';
    setTimeout(closeAuth, 3000);
  }
}

function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const err = document.getElementById('login-error');
  const suc = document.getElementById('login-success');
  err.style.display = 'none'; suc.style.display = 'none';
  if (!email || !email.includes('@')) {
    err.textContent = 'נא להזין כתובת מייל תקינה';
    err.style.display = 'block'; return;
  }
  suc.textContent = `📧 שלחנו קישור כניסה ל-${email}`;
  suc.style.display = 'block';
}

function updateNavAuth() {
  const area = document.getElementById('nav-auth-area');
  if (currentUser) {
    area.innerHTML = `<div class="user-badge" onclick="openAuth('login')">
      <span class="u-dot"></span>
      ${currentUser.name || currentUser.email}
    </div>`;
  } else {
    area.innerHTML = `<button class="nav-auth nav-item" onclick="openAuth('register')">כניסה / הרשמה</button>`;
  }
}

let curLang = 'he';

function setLang(lang, btn) {
  curLang = lang;
  const t = I18N[lang] || I18N['he'];  // fallback
  // Update html dir + lang
  const html = document.getElementById('html-root');
  html.setAttribute('dir', t.dir);
  html.setAttribute('lang', t.lang);
  // Update body direction
  document.body.style.direction = t.dir;
  // Update form inputs direction
  document.querySelectorAll('.form-input').forEach(el => el.style.direction = t.dir);
  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
  // Update placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key]) el.setAttribute('placeholder', t[key]);
  });
  // Update sort options
  ['sort-new','sort-old','sort-popular'].forEach((key,i) => {
    const opts = document.getElementById('sort').options;
    if (opts[i] && t[key]) opts[i].text = t[key];
  });
  // Update active lang button
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  const activeLangBtn = btn || document.querySelector(`.lang-btn[data-lang="${lang}"]`);
  if (activeLangBtn) activeLangBtn.classList.add('active');
  // Rebuild UI with new language
  buildSidebar();
  renderGrid(ALL_ARTICLES.filter(a => {
    const q = document.getElementById('q').value.toLowerCase();
    const src = document.getElementById('srcflt').value;
    const mt = curTopic === 'all' || a.topic === curTopic;
    const ms = curSub === 'הכל' || a.sub === curSub;
    const mq = !q || a.title.toLowerCase().includes(q) || (a.lines||[]).join(' ').toLowerCase().includes(q);
    const msrc = !src || a.src === src;
    return mt && ms && mq && msrc;
  }));
}
